  <style>
    body {
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    body.fade-in {
      opacity: 1;
    }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      margin-top: 1rem;
    }
    @media (max-width: 600px) {
      .photo-grid { grid-template-columns: 1fr; }
    }
    .photo-grid figure {
      margin: 0;
      text-align: center;
      cursor: pointer;
    }
    .photo-grid figure img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(44,62,80,0.12);
      transition: transform 0.2s, box-shadow 0.2s;
      display: block;
      object-fit: cover;
      aspect-ratio: 4/3;
    }
    .photo-grid figure img:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 20px rgba(44,62,80,0.22);
    }
    .photo-grid figcaption {
      margin-top: 0.5rem;
      font-size: 0.92rem;
      color: #666;
      line-height: 1.3;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 1rem;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw;
      max-height: 82vh;
      border-radius: 10px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    #lightbox figcaption {
      color: #ddd;
      font-size: 1rem;
      text-align: center;
      max-width: 80vw;
    }
    #lightbox-close {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      opacity: 0.8;
    }
    #lightbox-close:hover { opacity: 1; }
  </style>
</head>

  <!-- Lightbox -->

    <figcaption id="lightbox-caption"></figcaption>

  <footer class="modern-footer">
    <small>&copy; 2026 Koller | Design inspired by <a href="http://www.freecsstemplates.org/">Free CSS Templates</a>.</small>
  </footer>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.body.classList.add('fade-in');
    });

    function openLightbox(figure) {
      var img = figure.querySelector('img');
      var caption = figure.querySelector('figcaption');
      document.getElementById('lightbox-img').src = img.src;
      document.getElementById('lightbox-img').alt = img.alt;
      document.getElementById('lightbox-caption').textContent = caption ? caption.textContent : '';
      document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
